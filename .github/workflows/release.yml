name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
      release_sha: ${{ steps.release_commit.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip release commits
        id: skip_check
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute next patch version
        if: steps.skip_check.outputs.skip != 'true'
        id: get_version
        run: |
          CURRENT_VERSION=$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/p' Cargo.toml | head -n1)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not parse version from Cargo.toml"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update release metadata files
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag_name }}"
          REPO="https://github.com/${{ github.repository }}"

          sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml

          # Update extension.toml
          EXT="distribution/zed-extension/extension.toml"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" "$EXT"
          sed -i "s|${REPO}/releases/download/v[^/]*/cursor-acp-[^\"]*|${REPO}/releases/download/${TAG}/cursor-acp-${VERSION}|g" "$EXT"

          # Update agent.json
          AGENT="distribution/acp-registry/cursor-acp/agent.json"
          sed -i "s|\"version\": \"[^\"]*\"|\"version\": \"${VERSION}\"|" "$AGENT"
          sed -i "s|${REPO}/releases/download/v[^/]*/cursor-acp-[^\"]*|${REPO}/releases/download/${TAG}/cursor-acp-${VERSION}|g" "$AGENT"

          echo "Updated distribution files to version ${VERSION} (tag ${TAG})"
          git diff --stat

      - name: Commit and tag release
        if: steps.skip_check.outputs.skip != 'true'
        id: release_commit
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cargo update --workspace
          git add Cargo.toml Cargo.lock distribution/
          git commit -m "chore(release): ${TAG} [skip ci]"
          git tag "$TAG"
          git push origin HEAD
          git push origin "$TAG"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.os }}
    if: needs.prepare-release.outputs.release_sha != ''
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary_extension: ""
          - os: macos-14
            target: x86_64-apple-darwin
            binary_extension: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_extension: ""
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary_extension: ""
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary_extension: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_extension: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary_extension: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.target }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-git-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.target }}-cargo-git-

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Install UBSan runtime (musl)
        if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libubsan1
          fi

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Install musl build tools
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Configure rustc UBSan wrapper (musl host)
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
        name: Clear sanitizer flags (musl)
        shell: bash
        run: |
          set -euo pipefail
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        id: create_archive
        shell: bash
        run: |
          BINARY_NAME="cursor-acp${{ matrix.binary_extension }}"
          ARCHIVE_NAME="cursor-acp-${{ needs.prepare-release.outputs.version }}-${{ matrix.target }}"

          cd target/${{ matrix.target }}/release

          if [ "${{ matrix.os }}" = "windows-latest" ] || [ "${{ matrix.os }}" = "windows-11-arm" ]; then
            7z a -tzip "${ARCHIVE_NAME}.zip" "${BINARY_NAME}"
            echo "archive_path=${ARCHIVE_NAME}.zip" >> $GITHUB_OUTPUT
            echo "archive_name=${ARCHIVE_NAME}.zip" >> $GITHUB_OUTPUT
            mv "${ARCHIVE_NAME}.zip" ../../../
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "${BINARY_NAME}"
            echo "archive_path=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_OUTPUT
            echo "archive_name=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_OUTPUT
            mv "${ARCHIVE_NAME}.tar.gz" ../../../
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_archive.outputs.archive_name }}
          path: ${{ steps.create_archive.outputs.archive_path }}
          retention-days: 1

  create-release:
    name: Create Release
    if: needs.prepare-release.outputs.release_sha != ''
    needs: [prepare-release, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
