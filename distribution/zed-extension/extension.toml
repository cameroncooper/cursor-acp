id = "cursor-acp"
name = "Cursor ACP"
version = "1.0.6"
schema_version = 1
description = "ACP proxy for Cursor CLI — adds session persistence, Plan UI, and edit tracking"
repository = "https://github.com/cameroncooper/cursor-acp"
authors = ["Cursor ACP Contributors"]

[agent_servers.cursor-acp]
name = "Cursor CLI"
icon = "icon/cursor.svg"

[agent_servers.cursor-acp.env]
RUST_LOG = "warn"

[agent_servers.cursor-acp.targets.darwin-aarch64]
archive = "https://github.com/cameroncooper/cursor-acp/releases/download/v1.0.6/cursor-acp-1.0.6"
cmd = "./cursor-acp"
args = []

